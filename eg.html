<!DOCTYPE html>
<html lang="en">
    <head>
        <title>To Do </title>
    </head>
    <body>
        <h1>To Do List</h1>
        <input id="text">
        <button onclick="add ()">Add</button>
        <ul id="list"></ul>
        <script>
            
            function add () {
               let li = document.createElement("li");
               li.textContent = document.getElementById("text").value;
               document.getElementById("list").appendChild(li);
            
            }

            </script>
            </body>
            </html>
